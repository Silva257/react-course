<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1.2rem;
      }
      button {
        font-size: 1.1rem;
      }
   
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script type="text/babel">

      function ChatInput(){
        return (
        <div>
          <input 
            type="text" 
            placeholder="Send a message to Chatbot" 
          />
          <button>Send</button>
        </div>
      )
      }

      function ChatMessage( {message, sender} ){

      const userImage = <img src="user.png" alt="user" width="50" />;

      const robotImage = <img src="robot.png" alt="robot" width="50" />;

        // const message = props.message;
        // const sender = props.sender
        // const {message, sender} = props;

        /*
        if ( sender === 'robot'){
          return (
          <div>
            {robotImage} {message}  
          </div>
        )
          
        }
        */
        

        return (
          <div>
            {sender === 'robot' && robotImage}
            {message} 
            {sender === 'user' && userImage}
           
          </div>
        )
      }

      function App(){

        const chatMessages = [{
          message: "hello chatBot",
          sender: "user",
          id: 'id1'
        },{
          message: "cool, how can i help you ?",
          sender: "robot",
          id: 'id2'
        },{
          message: "whats your real name ?",
          sender: "user",
          id: 'id3'
        },{
          message: "ChatBot the Master..💫",
          sender: "robot",
          id: 'id4'
        },{
          message: "thank you",
          sender: "user",
          id: 'id5'
        },{
          message: "welcome",
          sender: "robot",
          id: 'id6'
        }];

       const messageComponent = chatMessages.map((chatMessage)=>{
        return (
          <>
            <ChatMessage 
              message={chatMessage.message}
              sender={chatMessage.sender}
              key={chatMessage.id} />
          </>
        )
       })

        return (
        <>
        <ChatInput />
        {messageComponent}
       </>
      )
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
      
    </script>
  </body>
</html>
