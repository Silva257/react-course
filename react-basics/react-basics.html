<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Basics</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1.2rem;
      }
      button {

  </head>
  <body>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script type="text/babel">

      const shippingCost = 5;
      const productCost = 10;

      const now = dayjs().format('MMMM D');
      console.log(now);

      console.log(currentTime);

        let currentTime = dayjs().format('HH:mm:ss');
        const div = <>
         <p>Product cost : $ <span>{productCost}</span></p>
         <p>Shipping cost : $ <span>{shippingCost}</span></p>
         <p>Total cost : $ <span>{productCost + shippingCost}</span></p>
